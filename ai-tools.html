let activeCategory = "all";
let searchQuery = "";
let activeFilter = "";

function debounce(fn, ms) { let t; return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); }; }

function renderTools() {
  const grid = document.getElementById("toolsGrid");
  const countEl = document.getElementById("toolCount");
  let filtered = tools;
  if (activeCategory !== "all") filtered = filtered.filter(t => t.category === activeCategory);
  if (activeFilter === "free") filtered = filtered.filter(t => t.tagTypes.includes("free"));
  if (activeFilter === "cn") filtered = filtered.filter(t => t.tagTypes.includes("cn"));
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.category.includes(q) || t.tags.some(tag => tag.includes(q)));
  }
  countEl.textContent = `共 ${filtered.length} 个工具`;
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results"><div class="no-results-icon">&#128269;</div><p>没有匹配的工具<br><span style="font-size:0.85rem;color:oklch(0.45 0.01 60)">换个关键词试试，或用分类浏览</span></p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(t => {
    const tagsHTML = t.tags.map((tag, i) => `<span class="tag ${t.tagTypes[i] || ''}">${tag}</span>`).join("");
    const fc = t.featured ? " featured" : "";
    return `<div class="tool-card${fc}">
      <div class="tool-card-header"><div class="tool-icon" style="background:${t.iconBg};color:#fff">${t.icon}</div></div>
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc">${t.desc}</div>
      <div class="tool-tags">${tagsHTML}</div>
      <a href="${t.url}" rel="noopener" class="tool-link" data-url="${t.url}">访问工具<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
    </div>`;
  }).join("");
}

document.getElementById("searchInput").addEventListener("input", debounce(function(e) { searchQuery = e.target.value; renderTools(); }, 250));
document.getElementById("categories").addEventListener("click", function(e) {
  if (e.target.classList.contains("cat-btn")) {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    activeCategory = e.target.dataset.cat;
    renderTools();
  }
});
document.querySelector(".feature-tags").addEventListener("click", function(e) {
  if (e.target.classList.contains("ftag")) {
    const filter = e.target.dataset.filter;
    if (activeFilter === filter) { activeFilter = ""; e.target.classList.remove("active"); }
    else {
      document.querySelectorAll(".ftag").forEach(f => f.classList.remove("active"));
      e.target.classList.add("active");
      activeFilter = filter;
    }
    renderTools();
  }
});
document.querySelectorAll("[data-nav-cat]").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    const cat = this.dataset.navCat;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === cat));
    activeCategory = cat; renderTools();
    document.getElementById("tools").scrollIntoView({ behavior: "smooth" });
  });
});

renderTools();

document.getElementById("toolsGrid").addEventListener("click", function(e) {
  e.preventDefault();
  const link = e.target.closest(".tool-link");
  if (!link) return;
  const url = link.dataset.url || link.getAttribute("href");
  if (!url) return;
  const a = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

(function() {
  const btn = document.getElementById("backToTop");
  let ticking = false;
  window.addEventListener("scroll", function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        btn.classList.toggle("visible", window.scrollY > 400);
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
  btn.addEventListener("click", function() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
})();
</script>
