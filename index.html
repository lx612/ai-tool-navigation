.nav-links { display: flex; gap: 1.5rem; align-items: center; }

.hero {

}

  font-weight: 700;

  margin-bottom: 1rem;
}

}
.hero p {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: oklch(0.65 0.01 60);
  max-width: 540px;
  margin: 0 auto 2.5rem;
}

/* === SEARCH === */
.search-wrap {
  position: relative;
  max-width: 560px;
  margin: 0 auto;
}
.search-wrap input {
  width: 100%;
  padding: 1rem 3.5rem 1rem 1.5rem;
  border-radius: 100px;
  border: 1.5px solid oklch(0.28 0.01 60);
  background: oklch(0.18 0.01 60);
  color: oklch(0.92 0.01 60);
  font-size: 1rem;

}

  outline: none;
  border-color: oklch(0.6 0.14 55);
  background: oklch(0.2 0.01 60);
  box-shadow: 0 0 0 4px oklch(0.68 0.16 55 / 0.12);
}
.search-icon {
  position: absolute;
  right: 1.2rem;
  top: 50%;
  transform: translateY(-50%);
  color: oklch(0.5 0.01 60);
  pointer-events: none;
  transition: color 0.3s;
}
.search-wrap input:focus ~ .search-icon { color: oklch(0.68 0.16 55); }

.categories {
  padding: 0 clamp(1rem, 4vw, 4rem) 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
}
.cat-btn {

  border-radius: 100px;
  font-size: 0.85rem;
  font-weight: 500;
  color: oklch(0.6 0.01 60);
  border: 1px solid oklch(0.28 0.01 60);

.tools-section {

}
.section-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 2rem;
}
.section-header h2 {

  font-weight: 600;
  letter-spacing: -0.02em;
}
.section-header h2 span {

  height: 8px;

}
.section-count {
  font-size: 0.85rem;
  color: oklch(0.48 0.01 60);
}

  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
}
@media (min-width: 900px) {

    grid-template-columns: 1fr 1fr 1fr;
  }
  .tool-card.featured { grid-column: span 2; }
}
@media (min-width: 1200px) {
  .tools-grid {
    grid-template-columns: 1fr 1fr 1fr 1fr;
  }
  .tool-card.featured { grid-column: span 2; }
}

.tool-card {

  border-radius: 16px;

  overflow: hidden;
}
.tool-card::before {
  content: "";

  inset: 0;
  border-radius: 16px;
  opacity: 0;
  background: radial-gradient(ellipse at top left, oklch(0.68 0.16 55 / 0.06), transparent 60%);
  transition: opacity 0.3s;
}
.tool-card:hover {
  border-color: oklch(0.35 0.03 60);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px oklch(0 0 0 / 0.3);
}
.tool-card:hover::before { opacity: 1; }
.tool-card-header {

  justify-content: space-between;
  margin-bottom: 0.75rem;

.tool-icon {

  height: 44px;

}

  margin-bottom: 1rem;

.tool-tags {

  margin-bottom: 1rem;

.tag.paid { background: oklch(0.68 0.16 55 / 0.1); color: oklch(0.78 0.12 55); }

.tool-link {

  gap: 0.4rem;
  font-size: 0.85rem;
  font-weight: 500;
  color: oklch(0.78 0.12 55);

}
.tool-link:hover { gap: 0.65rem; }

.no-results {

}
.no-results-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

.submit-cta::after {

  top: -50%;
  right: -20%;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, oklch(0.68 0.16 55 / 0.05), transparent 70%);

.submit-cta h3 {

  font-weight: 600;
  margin-bottom: 0.75rem;

.btn-submit-lg {

  gap: 0.5rem;
  padding: 0.75rem 2rem;
  border-radius: 100px;
  font-size: 0.95rem;
  font-weight: 600;
  background: oklch(0.68 0.16 55);
  color: oklch(0.14 0.01 60);

.footer-links { display: flex; gap: 3rem; flex-wrap: wrap; }
.footer-col h5 {

  font-weight: 600;

  letter-spacing: 0.05em;

.footer-col a {

  .tools-grid { grid-template-columns: 1fr; }
  .section-header { flex-direction: column; gap: 0.5rem; }
  .site-footer { flex-direction: column; gap: 2rem; }
  .footer-links { gap: 2rem; }
}

/* === ANIMATIONS === */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.tool-card { animation: fadeInUp 0.5s ease-out both; }
.tool-card:nth-child(1) { animation-delay: 0.05s; }
.tool-card:nth-child(2) { animation-delay: 0.1s; }
.tool-card:nth-child(3) { animation-delay: 0.15s; }
.tool-card:nth-child(4) { animation-delay: 0.2s; }
.tool-card:nth-child(5) { animation-delay: 0.25s; }
.tool-card:nth-child(6) { animation-delay: 0.3s; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>

// === STATE ===
let activeCategory = "all";
let searchQuery = "";

// === RENDER ===
function renderTools() {
  const grid = document.getElementById("toolsGrid");
  const countEl = document.getElementById("toolCount");

  let filtered = tools;

  if (activeCategory !== "all") {
    filtered = filtered.filter(t => t.category === activeCategory);
  }

  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    filtered = filtered.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      t.category.toLowerCase().includes(q) ||
      t.tags.some(tag => tag.toLowerCase().includes(q))
    );
  }

  countEl.textContent = `共 ${filtered.length} 个工具`;

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">&#128269;</div>
        <p>没有找到匹配的工具<br><span style="font-size:0.85rem;color:oklch(0.45 0.01 60)">试试换个关键词，或者浏览全部分类</span></p>
      </div>
    `;
    return;
  }

  grid.innerHTML = filtered.map(t => {
    const tagsHTML = t.tags.map((tag, i) => {
      const cls = t.tagTypes[i] || "";
      return `<span class="tag ${cls}">${tag}</span>`;
    }).join("");

    const featuredClass = t.featured ? " featured" : "";

    return `
      <div class="tool-card${featuredClass}">
        <div class="tool-card-header">
          <div class="tool-icon" style="background:${t.iconBg};color:#fff">${t.icon}</div>
        </div>
        <div class="tool-name">${t.name}</div>
        <div class="tool-desc">${t.desc}</div>
        <div class="tool-tags">${tagsHTML}</div>
        <a href="${t.url}" target="_blank" rel="noopener" class="tool-link">
          访问工具
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    `;
  }).join("");
}

// === EVENT LISTENERS ===
document.getElementById("searchInput").addEventListener("input", function(e) {
  searchQuery = e.target.value;
  renderTools();
});

document.getElementById("categories").addEventListener("click", function(e) {
  if (e.target.classList.contains("cat-btn")) {
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    activeCategory = e.target.dataset.cat;
    renderTools();
  }
});

// Footer category links
document.querySelectorAll("[data-nav-cat]").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();
    const cat = this.dataset.navCat;
    document.querySelectorAll(".cat-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.cat === cat);
    });
    activeCategory = cat;
    renderTools();
    document.getElementById("tools").scrollIntoView({ behavior: "smooth" });
  });
});

// === INIT ===
renderTools();
</script>
